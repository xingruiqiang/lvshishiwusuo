{% extends "base.html" %}

{% block title %}{% if case %}编辑案件{% else %}新增案件{% endif %} - 小型律所管理系统{% endblock %}

{% block page_title %}{% if case %}编辑案件{% else %}新增案件{% endif %}{% endblock %}

{% block content %}
<div class="card">
    <div class="card-body">
        <form method="POST">
            <div class="row mb-3">
                <div class="col-md-6">
                    <label class="form-label">客户 *</label>
                    <select name="client_id" class="form-select" required>
                        <option value="">请选择客户</option>
                        {% for client in clients %}
                        <option value="{{ client.id }}" {% if case and case.client_id == client.id %}selected{% endif %}>{{ client.name }} ({{ client.phone }})</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-md-6">
                    <label class="form-label">案号</label>
                    <input type="text" name="case_no" class="form-control" value="{% if case %}{{ case.case_no }}{% endif %}">
                </div>
            </div>
            
            <div class="row mb-3">
                <div class="col-md-6">
                    <label class="form-label">案件类型</label>
                    <select name="case_type" class="form-select">
                        <option value="">请选择</option>
                        <option value="民事" {% if case and case.case_type == '民事' %}selected{% endif %}>民事</option>
                        <option value="刑事" {% if case and case.case_type == '刑事' %}selected{% endif %}>刑事</option>
                        <option value="劳动" {% if case and case.case_type == '劳动' %}selected{% endif %}>劳动</option>
                        <option value="行政" {% if case and case.case_type == '行政' %}selected{% endif %}>行政</option>
                        <option value="执行" {% if case and case.case_type == '执行' %}selected{% endif %}>执行</option>
                    </select>
                </div>
                <div class="col-md-6">
                    <label class="form-label">受理法院</label>
                    <input type="text" name="court" class="form-control" value="{% if case %}{{ case.court }}{% endif %}">
                </div>
            </div>
            
            <div class="row mb-3">
                <div class="col-md-6">
                    <label class="form-label">承办律师</label>
                    <select name="lawyer_id" class="form-select">
                        <option value="">请选择</option>
                        {% for lawyer in lawyers %}
                        <option value="{{ lawyer.id }}" {% if case and case.lawyer_id == lawyer.id %}selected{% endif %}>{{ lawyer.real_name }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-md-6">
                    <label class="form-label">对方当事人</label>
                    <input type="text" name="opposite_party" class="form-control" value="{% if case %}{{ case.opposite_party }}{% endif %}">
                </div>
            </div>
            
            <div class="row mb-3">
                <div class="col-md-4">
                    <label class="form-label">收案日期</label>
                    <input type="date" name="accept_date" class="form-control" value="{% if case and case.accept_date %}{{ case.accept_date.strftime('%Y-%m-%d') }}{% endif %}">
                </div>
                <div class="col-md-4">
                    <label class="form-label">开庭日期</label>
                    <input type="date" name="court_date" class="form-control" value="{% if case and case.court_date %}{{ case.court_date.strftime('%Y-%m-%d') }}{% endif %}">
                </div>
                <div class="col-md-4">
                    <label class="form-label">审理阶段</label>
                    <select name="stage" class="form-select">
                        <option value="立案" {% if not case or case.stage == '立案' %}selected{% endif %}>立案</option>
                        <option value="举证" {% if case and case.stage == '举证' %}selected{% endif %}>举证</option>
                        <option value="开庭" {% if case and case.stage == '开庭' %}selected{% endif %}>开庭</option>
                        <option value="一审判决" {% if case and case.stage == '一审判决' %}selected{% endif %}>一审判决</option>
                        <option value="二审" {% if case and case.stage == '二审' %}selected{% endif %}>二审</option>
                        <option value="执行" {% if case and case.stage == '执行' %}selected{% endif %}>执行</option>
                        <option value="归档" {% if case and case.stage == '归档' %}selected{% endif %}>归档</option>
                    </select>
                </div>
            </div>
            
            <div class="row mb-3">
                <div class="col-md-6">
                    <label class="form-label">案件状态</label>
                    <select name="status" class="form-select">
                        <option value="在办" {% if not case or case.status == '在办' %}selected{% endif %}>在办</option>
                        <option value="结案" {% if case and case.status == '结案' %}selected{% endif %}>结案</option>
                    </select>
                </div>
            </div>
            
            <div class="d-flex justify-content-end">
                <a href="/case/list" class="btn btn-secondary me-2">取消</a>
                <button type="submit" class="btn btn-primary">保存</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
