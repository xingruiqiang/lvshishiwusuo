{% extends "base.html" %}

{% block title %}{% if exp %}编辑支出{% else %}新增支出{% endif %} - 小型律所管理系统{% endblock %}

{% block page_title %}{% if exp %}编辑支出{% else %}新增支出{% endif %}{% endblock %}

{% block content %}
<div class="card">
    <div class="card-body">
        <form method="POST">
            <div class="row mb-3">
                <div class="col-md-6">
                    <label class="form-label">关联案件</label>
                    <select name="case_id" class="form-select">
                        <option value="">请选择（可选）</option>
                        {% for case in cases %}
                        <option value="{{ case.id }}" {% if exp and exp.case_id == case.id %}selected{% endif %}>
                            {{ case.case_no or '-' }} - {{ case.court or '未知法院' }}
                        </option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-md-6">
                    <label class="form-label">支出类型 *</label>
                    <select name="expense_type" class="form-select" required>
                        <option value="">请选择</option>
                        <option value="办公" {% if exp and exp.expense_type == '办公' %}selected{% endif %}>办公</option>
                        <option value="案件" {% if exp and exp.expense_type == '案件' %}selected{% endif %}>案件</option>
                        <option value="差旅" {% if exp and exp.expense_type == '差旅' %}selected{% endif %}>差旅</option>
                        <option value="其他" {% if exp and exp.expense_type == '其他' %}selected{% endif %}>其他</option>
                    </select>
                </div>
            </div>

            <div class="row mb-3">
                <div class="col-md-6">
                    <label class="form-label">支出金额 *</label>
                    <input type="number" step="0.01" name="amount" class="form-control" value="{% if exp %}{{ exp.amount }}{% endif %}" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label">支出日期</label>
                    <input type="date" name="pay_date" class="form-control" value="{% if exp and exp.pay_date %}{{ exp.pay_date.strftime('%Y-%m-%d') }}{% endif %}">
                </div>
            </div>

            <div class="mb-3">
                <label class="form-label">备注</label>
                <textarea name="remark" class="form-control" rows="3">{% if exp %}{{ exp.remark }}{% endif %}</textarea>
            </div>

            <div class="d-flex justify-content-end">
                <a href="/finance/expense" class="btn btn-secondary me-2">取消</a>
                <button type="submit" class="btn btn-primary">保存</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
