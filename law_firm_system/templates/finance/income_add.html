{% extends "base.html" %}

{% block title %}{% if inc %}编辑收费{% else %}新增收费{% endif %} - 小型律所管理系统{% endblock %}

{% block page_title %}{% if inc %}编辑收费{% else %}新增收费{% endif %}{% endblock %}

{% block content %}
<div class="card">
    <div class="card-body">
        <form method="POST">
            <div class="row mb-3">
                <div class="col-md-6">
                    <label class="form-label">关联案件</label>
                    <select name="case_id" class="form-select">
                        <option value="">请选择（可选）</option>
                        {% for case in cases %}
                        <option value="{{ case.id }}" {% if inc and inc.case_id == case.id %}selected{% endif %}>
                            {{ case.case_no or '-' }} - {{ case.court or '未知法院' }}
                        </option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-md-6">
                    <label class="form-label">收费项目 *</label>
                    <input type="text" name="pay_type" class="form-control" value="{% if inc %}{{ inc.pay_type }}{% endif %}" placeholder="如：律师费、代理费" required>
                </div>
            </div>

            <div class="row mb-3">
                <div class="col-md-4">
                    <label class="form-label">收费金额 *</label>
                    <input type="number" step="0.01" name="amount" class="form-control" value="{% if inc %}{{ inc.amount }}{% endif %}" required>
                </div>
                <div class="col-md-4">
                    <label class="form-label">收款日期</label>
                    <input type="date" name="pay_date" class="form-control" value="{% if inc and inc.pay_date %}{{ inc.pay_date.strftime('%Y-%m-%d') }}{% endif %}">
                    <div class="form-text">留空表示未收款</div>
                </div>
                <div class="col-md-4">
                    <label class="form-label">开票状态</label>
                    <select name="invoice_status" class="form-select">
                        <option value="0" {% if not inc or inc.invoice_status == 0 %}selected{% endif %}>未开票</option>
                        <option value="1" {% if inc and inc.invoice_status == 1 %}selected{% endif %}>已开票</option>
                    </select>
                </div>
            </div>

            <div class="mb-3">
                <label class="form-label">备注</label>
                <textarea name="remark" class="form-control" rows="3">{% if inc %}{{ inc.remark }}{% endif %}</textarea>
            </div>

            <div class="d-flex justify-content-end">
                <a href="/finance/income" class="btn btn-secondary me-2">取消</a>
                <button type="submit" class="btn btn-primary">保存</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
