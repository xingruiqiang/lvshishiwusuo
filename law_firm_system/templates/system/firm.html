{% extends "base.html" %}

{% block title %}律所信息 - 小型律所管理系统{% endblock %}

{% block page_title %}律所信息配置{% endblock %}

{% block content %}
<div class="card">
    <div class="card-body">
        <form method="POST">
            <div class="row mb-3">
                <div class="col-md-6">
                    <label class="form-label">律所名称</label>
                    <input type="text" name="firm_name" class="form-control" value="{{ firm.firm_name or '' }}">
                </div>
                <div class="col-md-6">
                    <label class="form-label">统一社会信用代码</label>
                    <input type="text" name="credit_code" class="form-control" value="{{ firm.credit_code or '' }}">
                </div>
            </div>
            
            <div class="row mb-3">
                <div class="col-md-6">
                    <label class="form-label">法定代表人</label>
                    <input type="text" name="legal_rep" class="form-control" value="{{ firm.legal_rep or '' }}">
                </div>
                <div class="col-md-6">
                    <label class="form-label">成立日期</label>
                    <input type="date" name="establish_date" class="form-control" value="{% if firm.establish_date %}{{ firm.establish_date.strftime('%Y-%m-%d') }}{% endif %}">
                </div>
            </div>
            
            <div class="row mb-3">
                <div class="col-md-6">
                    <label class="form-label">地址</label>
                    <input type="text" name="address" class="form-control" value="{{ firm.address or '' }}">
                </div>
                <div class="col-md-6">
                    <label class="form-label">联系电话</label>
                    <input type="tel" name="phone" class="form-control" value="{{ firm.phone or '' }}">
                </div>
            </div>
            
            <div class="row mb-3">
                <div class="col-md-6">
                    <label class="form-label">电子邮箱</label>
                    <input type="email" name="email" class="form-control" value="{{ firm.email or '' }}">
                </div>
                <div class="col-md-6">
                    <label class="form-label">开户银行</label>
                    <input type="text" name="bank_name" class="form-control" value="{{ firm.bank_name or '' }}">
                </div>
            </div>
            
            <div class="row mb-3">
                <div class="col-md-6">
                    <label class="form-label">银行账号</label>
                    <input type="text" name="bank_account" class="form-control" value="{{ firm.bank_account or '' }}">
                </div>
            </div>
            
            <div class="d-flex justify-content-end">
                <button type="submit" class="btn btn-primary">保存配置</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
